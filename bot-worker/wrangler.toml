name = "slothys-tree-bot"
main = "src/index.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
account_id = "94162d717e2449239f5376e14df4b8ba"

# KV namespace used to count active mod clients (15-min heartbeat window).
# Create one with:
#   npx wrangler kv namespace create HEARTBEATS
# then paste the printed `id` here.
[[kv_namespaces]]
binding   = "HEARTBEATS"
id        = "760cc799d45e48c5a7b83e7dd819ecb0"
# preview_id = "PASTE-KV-PREVIEW-ID-HERE"   # optional, for `wrangler dev`

[vars]
GH_OWNER       = "IlySlothy"
GH_REPO        = "Slothy-s-Tree"
PACKS_JSON_URL = "https://raw.githubusercontent.com/IlySlothy/Slothy-s-Tree/main/docs/api/packs.json"
PACKS_SITE_BASE = "https://ilyslothy.github.io/Slothy-s-Tree"

# Pack upload review — set YOUR Discord user ID (Developer Mode → right-click profile → Copy User ID).
# The bot DMs you on every mod upload when this is set.
PACK_REVIEW_OWNER_USER_ID = "469607647989989376"
PACK_TICKET_GUILD_ID = "1112628116679045174"
PACK_TICKET_CATEGORY_ID = "1252079007323656305"

# Fallback if DM + ticket both fail or are unset
PACK_REVIEW_CHANNEL_ID = "1508910255738716370"
SUGGESTIONS_CHANNEL_ID = "1510387962301513759"
# Optional default channel for POST /v1/setup-leaderboard (or use /setup-leaderboard in Discord)
LEADERBOARD_CHANNEL_ID = ""

# Secrets (set with `wrangler secret put <NAME>`):
#   DISCORD_PUBLIC_KEY   - Application -> General Information -> Public Key
#   DISCORD_TOKEN        - Application -> Bot -> Reset Token
#   DISCORD_APP_ID       - Application -> General Information -> Application ID
#   GITHUB_TOKEN         - optional, raises GitHub API rate limit (60 -> 5000/hr)
