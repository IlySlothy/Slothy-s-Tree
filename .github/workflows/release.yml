name: Release

on:
  push:
    tags:
      - 'v*-mc1.21.8'
      - 'v*-mc1.21.11'
      - 'v*-mc1.20-1.21.1'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build release jars
        run: ./gradlew copyReleaseAssets --no-daemon

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "full=$TAG" >> "$GITHUB_OUTPUT"
          echo "jar_prefix=slothyhub-${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Release MC 1.21.8
        if: endsWith(github.ref, '-mc1.21.8')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.full }}
          name: Slothy's Tree ${{ steps.tag.outputs.full }}
          files: release-assets/${{ steps.tag.outputs.jar_prefix }}.jar
          body: |
            ## Minecraft 1.21.8 (Fabric)

            Download `${{ steps.tag.outputs.jar_prefix }}.jar` into your Fabric mods folder.

            ### Requirements
            - Fabric Loader 0.19+
            - Fabric API (matching 1.21.8)
            - Java 21

            CIT is built into the main jar on 1.21.8.

      - name: Release MC 1.21.9–1.21.11
        if: endsWith(github.ref, '-mc1.21.11')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.full }}
          name: Slothy's Tree ${{ steps.tag.outputs.full }}
          files: |
            release-assets/${{ steps.tag.outputs.jar_prefix }}.jar
            release-assets/slothyhub-cit-${{ steps.tag.outputs.jar_prefix }}.jar
          body: |
            ## Minecraft 1.21.9 – 1.21.11 (Fabric)

            Install the main jar. Optional CIT companion jar is included for early testing; embedded CIT is still in development.

            - `${{ steps.tag.outputs.jar_prefix }}.jar` — main hub
            - `slothyhub-cit-${{ steps.tag.outputs.jar_prefix }}.jar` — optional CIT companion

            ### Requirements
            - Fabric Loader 0.19+
            - Fabric API (matching your MC version)
            - Java 21

      - name: Release MC 1.20–1.21.1 (legacy)
        if: endsWith(github.ref, '-mc1.20-1.21.1')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.full }}
          name: Slothy's Tree ${{ steps.tag.outputs.full }}
          files: release-assets/${{ steps.tag.outputs.jar_prefix }}.jar
          body: |
            ## Minecraft 1.20 – 1.21.1 (Fabric, legacy)

            Download `${{ steps.tag.outputs.jar_prefix }}.jar`. For full CIT, also install [CIT Resewn](https://modrinth.com/mod/cit-resewn) for your version.

            ### Requirements
            - Fabric Loader 0.14+
            - Fabric API (matching your MC version)
            - Java 17 or 21
