plugins {
    id 'fabric-loom' version "${loom_version}"
}

version = project.mod_version + '-legacy'
group = project.maven_group

base {
    archivesName = 'slothyhub-legacy-cit'
}

repositories {
    mavenCentral()
}

loom {
    mods {
        slothyhub_legacy_cit {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.layered {
        mappings "net.fabricmc:intermediary:${project.minecraft_version}"
    }
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    modImplementation "io.github.llamalad7:mixinextras-fabric:0.4.1"
    compileOnly project(':')
}

processResources {
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 17
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}